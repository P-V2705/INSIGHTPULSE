services:
  - type: web
    name: sentimentai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python download_nltk.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
    autoDeploy: true
