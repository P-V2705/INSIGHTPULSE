# ── Netlify configuration ─────────────────────────────────────────────────────
# Frontend: React/Vite SPA built from ./frontend
# Backend:  FastAPI on Render at https://insightpulse-ja7r.onrender.com

[build]
  base    = "frontend"
  command = "npm install --legacy-peer-deps && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# ── API proxy ─────────────────────────────────────────────────────────────────
# All /api/* requests are proxied to the Render backend.
# status=200 + force=true means Netlify fetches and returns the response
# without redirecting the browser (transparent reverse proxy).
[[redirects]]
  from   = "/api/*"
  to     = "https://insightpulse-ja7r.onrender.com/api/:splat"
  status = 200
  force  = true

# ── SPA fallback — all non-asset paths → index.html ──────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# ── Cache static assets aggressively ─────────────────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
