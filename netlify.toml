# ── Netlify configuration ─────────────────────────────────────────────────────
# Frontend: React/Vite SPA built from ./frontend
# Backend:  FastAPI on Render — set VITE_API_URL (and BACKEND_URL) in Netlify
#           Site Settings → Environment Variables

[build]
  base    = "frontend"
  command = "npm install --legacy-peer-deps && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# ── API proxy — forward /api/* to the deployed FastAPI backend ────────────────
# Set BACKEND_URL in Netlify env vars to your Render URL, e.g.:
#   https://sentimentai-backend.onrender.com
# This avoids CORS and keeps the frontend calling a relative /api path.
[[redirects]]
  from   = "/api/*"
  to     = ":BACKEND_URL/api/:splat"
  status = 200
  force  = true

# ── SPA fallback — all non-file paths → index.html ───────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# ── Cache static assets aggressively ─────────────────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
