name: CD — Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node.js ─────────────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ── Install dependencies ─────────────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          # VITE_API_URL is intentionally left blank for production.
          # The frontend always calls relative /api/* paths; Cloudflare Pages
          # _redirects proxies those to the Render backend.
          VITE_API_URL: ""
          NODE_ENV: production

      # ── Deploy to Cloudflare Pages ────────────────────────────────────────────
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=insightpulse --commit-dirty=true

      # ── Deployment summary ───────────────────────────────────────────────────
      - name: Deployment summary
        if: success()
        run: |
          echo "✅ Deployment complete!"
          echo "🌍 Live at: https://insightpulse.pages.dev"
          echo "   (or your custom domain if configured in Cloudflare dashboard)"
