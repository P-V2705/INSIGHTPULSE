name: CD — Deploy to Netlify (ana-pulse.netlify.app)

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy → ana-pulse.netlify.app
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js ───────────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ── Install ───────────────────────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build frontend (production)
        working-directory: frontend
        run: npm run build
        env:
          # Intentionally blank — netlify.toml proxy handles /api/* in production.
          VITE_API_URL: ""
          NODE_ENV: production

      # ── Verify build output ────────────────────────────────────────────────
      - name: Verify dist exists
        working-directory: frontend
        run: |
          ls -la dist/
          test -f dist/index.html && echo "✅ index.html present" || (echo "❌ index.html missing" && exit 1)

      # ── Deploy to Netlify ─────────────────────────────────────────────────
      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './frontend/dist'
          production-branch: main
          production-deploy: true
          deploy-message: "CD: ${{ github.event.head_commit.message }} (${{ github.sha }})"
          enable-pull-request-comment: false
          enable-commit-comment: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 10

      # ── Backup: ping build hook ────────────────────────────────────────────
      # Triggers a direct Netlify build as a fallback in case the action deploy fails.
      - name: Ping Netlify build hook (backup trigger)
        if: always()
        run: |
          if [ -n "${{ secrets.NETLIFY_BUILD_HOOK }}" ]; then
            curl -s -X POST "${{ secrets.NETLIFY_BUILD_HOOK }}" -d "{}" \
              -H "Content-Type: application/json" || true
            echo "✅ Netlify build hook pinged"
          else
            echo "ℹ️  NETLIFY_BUILD_HOOK not set — skipping backup trigger"
          fi

      # ── Summary ────────────────────────────────────────────────────────────
      - name: Deployment summary
        if: success()
        run: |
          echo ""
          echo "╔══════════════════════════════════════════╗"
          echo "║   ✅  DEPLOYMENT SUCCESSFUL               ║"
          echo "║   🌍  https://ana-pulse.netlify.app       ║"
          echo "╚══════════════════════════════════════════╝"
          echo ""
          echo "Commit : ${{ github.sha }}"
          echo "Message: ${{ github.event.head_commit.message }}"
          echo "Author : ${{ github.event.head_commit.author.name }}"
