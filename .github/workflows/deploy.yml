name: CD — Auto Deploy to Netlify

# ── Triggers ───────────────────────────────────────────────────────────────────
# Fires on every push to main — whether from Kiro IDE auto-commit or manual push.
on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy → insightpulseanalysis.netlify.app
    runs-on: ubuntu-latest

    steps:
      # 1. Get the code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Node setup with cache
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # 3. Install — legacy-peer-deps avoids react-wordcloud ERESOLVE
      - name: Install dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      # 4. Build Vite app — inject backend URL from secret
      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # 5. Deploy to insightpulseanalysis.netlify.app
      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './frontend/dist'
          production-branch: main
          production-deploy: true
          deploy-message: |
            Auto-deploy from Kiro IDE
            Commit: ${{ github.sha }}
            Message: ${{ github.event.head_commit.message }}
          enable-pull-request-comment: false
          enable-commit-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 10
