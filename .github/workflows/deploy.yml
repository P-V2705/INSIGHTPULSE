name: CD — Auto Deploy to Netlify

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build and Deploy to insightpulseanalysis.netlify.app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './frontend/dist'
          production-branch: main
          production-deploy: true
          deploy-message: "Auto-deploy: ${{ github.event.head_commit.message }}"
          enable-pull-request-comment: false
          enable-commit-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 10

      - name: Ping Netlify Build Hook (instant backup trigger)
        if: always()
        run: |
          curl -s -X POST "https://api.netlify.com/build_hooks/6a1ece5d2b3bd99bc56c64b0" -d "{}" || true
          echo "Netlify build hook pinged for insightpulseanalysis.netlify.app"
