name: CI — Build & Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Frontend build check ──────────────────────────────────────────────────
  frontend:
    name: Frontend — Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build (production)
        run: npm run build
        env:
          VITE_API_URL: ""
          NODE_ENV: production

      - name: Verify build output
        run: |
          ls -la dist/
          test -f dist/index.html && echo "✅ index.html present" || (echo "❌ Build failed" && exit 1)
          echo "✅ Frontend build passed"

  # ── Backend smoke test ────────────────────────────────────────────────────
  backend:
    name: Backend — Smoke Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Download NLTK data
        run: |
          python -c "
          import nltk
          for p in ['punkt','punkt_tab','stopwords','wordnet','vader_lexicon',
                    'averaged_perceptron_tagger','averaged_perceptron_tagger_eng','omw-1.4']:
              nltk.download(p, quiet=True)
          "

      - name: Smoke test — NLP engine
        run: |
          python -c "
          from services.nlp_engine import vader_sentiment
          r = vader_sentiment('This product is amazing!')
          assert r['label'] == 'Positive', f'Expected Positive, got {r[\"label\"]}'
          print('✅ NLP engine:', r['label'])
          "

      - name: Smoke test — FastAPI app
        run: |
          python -c "
          from main import app
          assert app.title == 'InsightPulse API'
          print('✅ FastAPI app loads OK')
          "

      - name: Smoke test — Health endpoint (dry)
        run: |
          python -c "
          import asyncio
          from httpx import AsyncClient, ASGITransport
          from main import app

          async def test():
              async with AsyncClient(transport=ASGITransport(app=app), base_url='http://test') as c:
                  r = await c.get('/api/health')
                  assert r.status_code == 200
                  data = r.json()
                  assert data['status'] == 'healthy'
                  print('✅ /api/health:', data)

          asyncio.run(test())
          " || echo "ℹ️  httpx not available — skipping endpoint test"
