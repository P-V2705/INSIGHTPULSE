name: CI — Build & Lint

# Runs on every push and pull-request to main.
# Netlify's own GitHub integration handles the actual deployment
# (triggered automatically when this workflow succeeds).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend build ──────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Install & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Point the production build at the deployed backend.
          # Set this secret in: GitHub → Settings → Secrets → Actions
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ── Backend lint / import check ─────────────────────────────────────────────
  backend:
    name: Backend — Lint & Import Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download NLTK data
        run: |
          python -c "
          import nltk
          for pkg in ['punkt','punkt_tab','stopwords','wordnet','vader_lexicon','averaged_perceptron_tagger','omw-1.4']:
              nltk.download(pkg, quiet=True)
          print('NLTK OK')
          "

      - name: Import check (smoke test)
        run: |
          python -c "
          from services.nlp_engine import vader_sentiment, build_concise_summary
          from services.dataset_processor import load_dataset, detect_columns
          from services.analysis_engine import run_full_analysis
          r = vader_sentiment('This product is amazing!')
          assert r['label'] == 'Positive', f'Expected Positive, got {r[\"label\"]}'
          print('All imports OK — sentiment:', r)
          "
