name: CI — Build & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend — Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

  backend:
    name: Backend — Import Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install
        run: pip install -r requirements.txt --quiet

      - name: NLTK data
        run: |
          python -c "
          import nltk
          for p in ['punkt','punkt_tab','stopwords','wordnet','vader_lexicon','averaged_perceptron_tagger','omw-1.4']:
              nltk.download(p, quiet=True)
          "

      - name: Smoke test
        run: |
          python -c "
          from services.nlp_engine import vader_sentiment, build_concise_summary
          from services.dataset_processor import load_dataset, detect_columns
          r = vader_sentiment('This product is amazing!')
          assert r['label'] == 'Positive'
          print('OK:', r['label'])
          "
